name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install cmake

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            cmake

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Agent22 ${{ github.ref_name }}'
          releaseBody: |
            ## Agent22 ${{ github.ref_name }}

            Offline AI desktop app powered by Sustainability Buddy.

            ### Download
            | Platform | File |
            |----------|------|
            | macOS | `.dmg` |
            | Windows | `.msi` |
            | Linux | `.AppImage` or `.deb` |

            > **macOS note:** The app is unsigned. Right-click → Open on first launch.
            >
            > The AI model (~1 GB) downloads automatically on first use.
          releaseDraft: true
          prerelease: false
